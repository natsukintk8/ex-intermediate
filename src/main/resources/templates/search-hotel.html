<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>ホテル検索</h1>
<form action="" th:action="@{/hotel/search}" method="post">
    <input type="text" name="price">円以下<br>
    <button>検索</button>
</form>
<div th:if="${hotelList}" th:each="hotel:${hotelList}">
    <table>
        <tr>
            <td>ホテル名</td>
            <td th:text="${hotel.hotelName}"></td>
        </tr>
        <tr>
            <td>最寄駅</td>
            <td th:text="${hotel.nearestStation}"></td>
        </tr>
        <tr>
            <td>価格</td>
            <td th:text="${hotel.price}"></td>
        </tr>
    </table>

</div>

<div th:if="${hotelList.size()==0}">
    <span th:text="${price}"></span>円以下のホテル情報は存在しません
</div>

</body>
</html>
