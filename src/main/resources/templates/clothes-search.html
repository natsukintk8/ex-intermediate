<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>衣類検索</h1>
<form action="" th:action="@{/clothes/search}" method="post">
    <input type="radio" name="gender" value="0" checked>Man&nbsp;&nbsp;
    <select name="color" id="">
        <option value="赤" selected>赤</option>
        <option value="青" >青</option>
        <option value="白" >白</option>
        <option value="黄" >黄</option>
    </select><br>
    <input type="radio" name="gender" value="1">Woman<br>
    <button>検索</button>
</form>
<div th:if="${clothesList}" th:each="clothes:${clothesList}">
<table>
    <tr>
        <th>ジャンル</th>
        <td th:text="${clothes.genre}"></td>
    </tr>
    <tr>
        <th>サイズ</th>
        <td th:text="${clothes.size}"></td>
    </tr>
    <tr>
        <th>価格</th>
        <td th:text="${clothes.price}"></td>
    </tr>
</table>
</div>
<div th:if="${#lists.isEmpty(clothesList)}">
    <span th:text="${error}"></span>
</div>
</body>
</html>
